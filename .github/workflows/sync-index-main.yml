name: sync-index (main)

on:
  push:
    branches: [main]
    paths:
      - "presets/**"
      - "scripts/sync_index.py"
      - "scripts/validate_index.py"

concurrency:
  group: sync-index-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install blake3
        run: pip install blake3

      - name: Regenerate index.json
        run: python scripts/sync_index.py

      - name: Validate index.json schema
        run: python scripts/validate_index.py --strict

      - name: Commit if changed
        run: |
          if git diff --quiet -- index.json; then
            echo "index.json already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: sync index.json"
          git push
