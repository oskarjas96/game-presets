name: sync-index (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "presets/**"
      - "scripts/sync_index.py"
      - "scripts/validate_index.py"
      - "index.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install blake3
        run: pip install blake3

      - name: Verify index.json
        run: python scripts/sync_index.py --check --diff

      - name: Validate index.json schema
        run: python scripts/validate_index.py --strict
